<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow1" cx="75%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#D93B2B" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#1C1814" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="15%" cy="85%" r="40%">
      <stop offset="0%" stop-color="#D93B2B" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#1C1814" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#1C1814"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Top plasma line -->
  <rect x="0" y="0" width="1200" height="3" fill="#D93B2B" opacity="0.9"/>

  <!-- Grid lines — subtle structure -->
  <line x1="0" y1="90" x2="1200" y2="90" stroke="rgba(248,245,238,0.04)" stroke-width="1"/>
  <line x1="0" y1="540" x2="1200" y2="540" stroke="rgba(248,245,238,0.04)" stroke-width="1"/>
  <line x1="580" y1="0" x2="580" y2="630" stroke="rgba(248,245,238,0.04)" stroke-width="1"/>

  <!-- Logo mark — scaled up, centered left -->
  <!-- Sun -->
  <circle cx="160" cy="200" r="44" fill="none" stroke="#D93B2B" stroke-width="1.5" opacity="0.2"/>
  <circle cx="160" cy="200" r="34" fill="none" stroke="#D93B2B" stroke-width="1.5" opacity="0.35"/>
  <circle cx="160" cy="200" r="22" fill="#D93B2B"/>
  <circle cx="152" cy="192" r="7" fill="#FF9000" opacity="0.6"/>
  <!-- Sun rays -->
  <g stroke="#D93B2B" stroke-width="2.5" stroke-linecap="round" opacity="0.6">
    <line x1="160" y1="148" x2="160" y2="160"/>
    <line x1="160" y1="240" x2="160" y2="252"/>
    <line x1="118" y1="158" x2="126" y2="168"/>
    <line x1="202" y1="158" x2="194" y2="168"/>
    <line x1="108" y1="200" x2="120" y2="200"/>
    <line x1="200" y1="200" x2="212" y2="200"/>
    <line x1="118" y1="242" x2="126" y2="232"/>
    <line x1="202" y1="242" x2="194" y2="232"/>
  </g>
  <!-- Trunk -->
  <rect x="155" y="248" width="10" height="100" rx="2" fill="#F8F5EE" opacity="0.15"/>
  <!-- Branches -->
  <line x1="160" y1="270" x2="120" y2="255" stroke="#F8F5EE" stroke-width="6" stroke-linecap="round" opacity="0.18"/>
  <line x1="160" y1="270" x2="200" y2="255" stroke="#F8F5EE" stroke-width="6" stroke-linecap="round" opacity="0.18"/>
  <line x1="160" y1="290" x2="108" y2="278" stroke="#F8F5EE" stroke-width="4" stroke-linecap="round" opacity="0.12"/>
  <line x1="160" y1="290" x2="212" y2="278" stroke="#F8F5EE" stroke-width="4" stroke-linecap="round" opacity="0.12"/>
  <!-- Panels -->
  <rect x="102" y="248" width="34" height="16" rx="3" fill="#2A2520" stroke="#D93B2B" stroke-width="1" opacity="0.7"/>
  <rect x="184" y="248" width="34" height="16" rx="3" fill="#2A2520" stroke="#D93B2B" stroke-width="1" opacity="0.7"/>
  <rect x="88" y="270" width="28" height="14" rx="3" fill="#2A2520" stroke="#D93B2B" stroke-width="0.8" opacity="0.5"/>
  <rect x="204" y="270" width="28" height="14" rx="3" fill="#2A2520" stroke="#D93B2B" stroke-width="0.8" opacity="0.5"/>
  <rect x="140" y="238" width="40" height="16" rx="3" fill="#2A2520" stroke="#D93B2B" stroke-width="1.2" opacity="0.8"/>
  <!-- EV station -->
  <rect x="148" y="352" width="24" height="18" rx="3" fill="#2A2520" stroke="#D93B2B" stroke-width="1" opacity="0.7"/>
  <rect x="151" y="356" width="18" height="5" rx="2" fill="rgba(248,245,238,0.1)"/>
  <rect x="151" y="356" width="12" height="5" rx="2" fill="#D93B2B" opacity="0.8"/>

  <!-- Wordmark -->
  <text x="270" y="232" font-family="Georgia, serif" font-size="88" font-weight="300" fill="rgba(248,245,238,0.9)" letter-spacing="-3">Solar</text>
  <text x="548" y="232" font-family="Georgia, serif" font-size="88" font-weight="700" fill="#D93B2B" letter-spacing="-3">Nexa</text>

  <!-- Tagline -->
