  <!-- Bottom divider -->
  <line x1="270" y1="345" x2="900" y2="345" stroke="rgba(248,245,238,0.08)" stroke-width="1"/>

  <!-- Stats row -->
  <text x="270" y="400" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#D93B2B">27%</text>
  <text x="270" y="430" font-family="sans-serif" font-size="14" font-weight="500" fill="rgba(248,245,238,0.35)" letter-spacing="2">MARKET CAGR</text>

  <line x1="420" y1="378" x2="420" y2="440" stroke="rgba(248,245,238,0.08)" stroke-width="1"/>

  <text x="444" y="400" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#D93B2B">~1%</text>
  <text x="444" y="430" font-family="sans-serif" font-size="14" font-weight="500" fill="rgba(248,245,238,0.35)" letter-spacing="2">GROUND FOOTPRINT</text>

  <line x1="610" y1="378" x2="610" y2="440" stroke="rgba(248,245,238,0.08)" stroke-width="1"/>

  <text x="634" y="400" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#D93B2B">+30%</text>
  <text x="634" y="430" font-family="sans-serif" font-size="14" font-weight="500" fill="rgba(248,245,238,0.35)" letter-spacing="2">ENERGY YIELD</text>

  <line x1="820" y1="378" x2="820" y2="440" stroke="rgba(248,245,238,0.08)" stroke-width="1"/>

  <text x="844" y="400" font-family="Georgia, serif" font-size="42" font-weight="700" fill="#D93B2B">L2</text>
  <text x="844" y="430" font-family="sans-serif" font-size="14" font-weight="500" fill="rgba(248,245,238,0.35)" letter-spacing="2">EV CHARGING</text>

  <!-- Domain badge -->
  <rect x="270" y="490" width="240" height="36" rx="6" fill="rgba(217,59,43,0.12)" stroke="rgba(217,59,43,0.3)" stroke-width="1"/>
  <text x="390" y="514" font-family="sans-serif" font-size="14" font-weight="600" fill="#D93B2B" text-anchor="middle" letter-spacing="1">SOLARNEXA.VERCEL.APP</text>

  <!-- CleanTech badge -->
  <rect x="530" y="490" width="130" height="36" rx="6" fill="rgba(248,245,238,0.04)" stroke="rgba(248,245,238,0.1)" stroke-width="1"/>
  <text x="595" y="514" font-family="sans-serif" font-size="13" font-weight="500" fill="rgba(248,245,238,0.4)" text-anchor="middle" letter-spacing="1">CLEANTECH</text>

  <rect x="678" y="490" width="200" height="36" rx="6" fill="rgba(248,245,238,0.04)" stroke="rgba(248,245,238,0.1)" stroke-width="1"/>
  <text x="778" y="514" font-family="sans-serif" font-size="13" font-weight="500" fill="rgba(248,245,238,0.4)" text-anchor="middle" letter-spacing="1">BENGALURU · 2023</text>
</svg>
